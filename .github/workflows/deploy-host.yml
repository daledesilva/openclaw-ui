name: Deploy host webhook

on:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

  notify-host:
    needs: verify
    if: ${{ secrets.DEPLOY_WEBHOOK_URL != '' && secrets.DEPLOY_WEBHOOK_SECRET != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        env:
          URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${SECRET}" \
            "${URL}"
