name: Deploy host webhook

on:
  push:
    branches:
      - main

# Helps older patterns; checkout@v6 / setup-node@v6 use a current Node runtime for the actions themselves.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install and build
        env:
          VITE_BUILD_REV: ${{ github.run_number }}
        run: |
          npm ci
          npm run build

  # Job-level `if` cannot use `secrets.*` (GitHub restriction). Pass secrets into env and skip in the shell.
  notify-host:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        env:
          URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          if [ -z "$URL" ] || [ -z "$SECRET" ]; then
            echo "Skipping deploy webhook: set DEPLOY_WEBHOOK_URL and DEPLOY_WEBHOOK_SECRET in repo Actions secrets."
            exit 0
          fi

          max=5
          attempt=1
          while [ "$attempt" -le "$max" ]; do
            echo "----- attempt $attempt/$max: POST $URL -----"
            code=$(curl -sS --max-time 120 -o /tmp/webhook_body -w "%{http_code}" -X POST \
              -H "Authorization: Bearer ${SECRET}" \
              "${URL}" || echo "000")
            echo "Response body:"
            cat /tmp/webhook_body || true
            echo ""
            echo "HTTP status: $code"

            if [ "$code" = "000" ]; then
              echo "::error::curl failed (DNS, connection reset, or TLS). Check DEPLOY_WEBHOOK_URL and tunnel."
              exit 1
            fi

            if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
              echo "Webhook accepted (2xx)."
              exit 0
            fi

            # Cloudflare 502 = tunnel up but origin (127.0.0.1:8788) refused / nothing listening / cloudflared → wrong port
            if [ "$code" = "502" ] || [ "$code" = "503" ] || [ "$code" = "504" ]; then
              if [ "$attempt" -lt "$max" ]; then
                echo "Gateway/proxy error $code — often tunnel cannot reach npm run webhook:deploy. Retrying in 20s…"
                sleep 20
                attempt=$((attempt + 1))
                continue
              fi
            fi

            echo "::error::Webhook HTTP $code. 502: on the PC run cloudflared + 'npm run webhook:deploy' (port 8788); config.yml service must be http://127.0.0.1:8788. 401: secret mismatch. 404: URL/path. 429: deploy already running."
            exit 1
          done
