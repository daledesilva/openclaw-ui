name: Deploy host webhook

on:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

  # Job-level `if` cannot use `secrets.*` (GitHub restriction). Pass secrets into env and skip in the shell.
  notify-host:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        env:
          URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          if [ -z "$URL" ] || [ -z "$SECRET" ]; then
            echo "Skipping deploy webhook: set DEPLOY_WEBHOOK_URL and DEPLOY_WEBHOOK_SECRET in repo Actions secrets."
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer ${SECRET}" \
            "${URL}"
